services:
  postgres:
    image: postgres:16
    env_file:
      - database.env
    ports:
      - "5432:5432"
    volumes:
      - ./data/postgres:/var/lib/postgresql/data

  backend:
    build:
      context: .
      dockerfile: docker/Dockerfile
    env_file:
      - ./.env
    volumes:
      - ./data:/app/data
    ports:
      - "8000:8000"
      - "8501:8501"
    depends_on:
      - postgres
      - ollama
    environment:
      - OLLAMA_BASE_URL=http://ollama:11434

  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ./data/ollama:/root/.ollama
    restart: unless-stopped
